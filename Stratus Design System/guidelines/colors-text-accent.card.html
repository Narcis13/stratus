<!-- @dsCard group="Colors" viewport="700x120" name="Text & Accent" subtitle="Primary/muted text and the single brand blue" -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>body{margin:0;background:var(--strat-bg);font-family:var(--strat-font-sans);padding:16px}.row{display:flex;gap:12px}.sw{flex:1;border-radius:8px;border:1px solid var(--strat-border);padding:12px;min-height:60px;display:flex;flex-direction:column;justify-content:flex-end}.n{font-size:12px;font-weight:600}.h{font-size:11px;font-variant-numeric:tabular-nums;opacity:.8}</style></head>
<body><div class="row">
<div class="sw" style="background:var(--strat-bg-elev)"><span class="n" style="color:var(--strat-text)">text</span><span class="h" style="color:var(--strat-text)">#e8ebf0</span></div>
<div class="sw" style="background:var(--strat-bg-elev)"><span class="n" style="color:var(--strat-muted)">muted</span><span class="h" style="color:var(--strat-muted)">#8b95a7</span></div>
<div class="sw" style="background:var(--strat-accent)"><span class="n" style="color:#fff">accent</span><span class="h" style="color:#fff">#4f8cff</span></div>
<div class="sw" style="background:var(--strat-accent-hover)"><span class="n" style="color:#0e1014">accent-hover</span><span class="h" style="color:#0e1014">#6ba0ff</span></div>
</div></body></html>
