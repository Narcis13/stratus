<!-- @dsCard group="Type" viewport="700x300" name="Type scale" subtitle="A compact, information-first ramp from 9px meta to the 26px KPI" -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>body{margin:0;background:var(--strat-bg);color:var(--strat-text);font-family:var(--strat-font-sans);padding:18px}table{border-collapse:collapse;width:100%}td{padding:6px 0;border-bottom:1px solid var(--strat-border);vertical-align:baseline}.tok{color:var(--strat-muted);font-size:11px;font-family:var(--strat-font-mono);width:150px}.px{color:var(--strat-muted);font-size:11px;width:56px;font-variant-numeric:tabular-nums}</style></head>
<body><table>
<tr><td class="tok">--strat-text-kpi</td><td class="px">26px</td><td style="font-size:26px;font-weight:700;line-height:1.1">1,284</td></tr>
<tr><td class="tok">--strat-text-lg</td><td class="px">15px</td><td style="font-size:15px;font-weight:600">Dossier name</td></tr>
<tr><td class="tok">--strat-text-h2</td><td class="px">14px</td><td style="font-size:14px;font-weight:600">Panel title</td></tr>
<tr><td class="tok">--strat-text-body</td><td class="px">13px</td><td style="font-size:13px">Body copy, inputs & textareas</td></tr>
<tr><td class="tok">--strat-text-sm</td><td class="px">12px</td><td style="font-size:12px">Buttons, tabs, most labels</td></tr>
<tr><td class="tok">--strat-text-xs</td><td class="px">11px</td><td style="font-size:11px">Meta, timestamps, counters</td></tr>
<tr><td class="tok">--strat-text-2xs</td><td class="px">10px</td><td style="font-size:10px;text-transform:uppercase;letter-spacing:.04em;font-weight:600">Badges &amp; kind chips</td></tr>
<tr><td class="tok">--strat-text-3xs</td><td class="px">9px</td><td style="font-size:9px;text-transform:uppercase;letter-spacing:.04em;font-weight:600;color:var(--strat-band-hot)">ready</td></tr>
</table></body></html>
