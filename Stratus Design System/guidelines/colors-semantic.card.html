<!doctype html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>body{margin:0;background:var(--strat-bg);font-family:var(--strat-font-sans);padding:16px}.row{display:flex;gap:12px}.sw{flex:1;border-radius:8px;padding:12px;min-height:60px;display:flex;flex-direction:column;justify-content:flex-end;color:#0e1014}.n{font-size:12px;font-weight:700}.h{font-size:11px;font-variant-numeric:tabular-nums}</style></head>
<body><div class="row">
<div class="sw" style="background:var(--strat-danger)"><span class="n">danger</span><span class="h">#e0556d</span></div>
<div class="sw" style="background:var(--strat-warn)"><span class="n">warn</span><span class="h">#ffb454</span></div>
<div class="sw" style="background:var(--strat-ok)"><span class="n">ok</span><span class="h">#5ad19a</span></div>
</div></body></html>
