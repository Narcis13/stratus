<!-- @dsCard group="Colors" viewport="700x140" name="Surfaces" subtitle="Deep canvas → elevated panel → hover, bound by hairline borders" -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>body{margin:0;background:var(--strat-bg);font-family:var(--strat-font-sans);padding:16px}.row{display:flex;gap:12px}.sw{flex:1;border-radius:8px;border:1px solid var(--strat-border);padding:12px;min-height:78px;display:flex;flex-direction:column;justify-content:flex-end}.n{color:var(--strat-text);font-size:12px;font-weight:600}.h{color:var(--strat-muted);font-size:11px;font-variant-numeric:tabular-nums}</style></head>
<body><div class="row">
<div class="sw" style="background:var(--strat-bg)"><span class="n">bg</span><span class="h">#0e1014</span></div>
<div class="sw" style="background:var(--strat-bg-elev)"><span class="n">bg-elev</span><span class="h">#161a21</span></div>
<div class="sw" style="background:var(--strat-bg-hover)"><span class="n">bg-hover</span><span class="h">#1d222b</span></div>
<div class="sw" style="background:var(--strat-border)"><span class="n">border</span><span class="h">#262c36</span></div>
</div></body></html>
