<!-- @dsCard group="Spacing" viewport="700x200" name="Spacing scale" subtitle="A tight 2px-based rhythm; 2–12px does most of the work" -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>body{margin:0;background:var(--strat-bg);color:var(--strat-text);font-family:var(--strat-font-sans);padding:18px}.r{display:flex;align-items:center;gap:14px;margin-bottom:8px}.tok{width:150px;color:var(--strat-muted);font-size:11px;font-family:var(--strat-font-mono)}.bar{height:14px;background:var(--strat-accent);border-radius:3px}</style></head>
<body>
<div class="r"><span class="tok">--strat-space-1 · 2px</span><div class="bar" style="width:2px"></div></div>
<div class="r"><span class="tok">--strat-space-2 · 4px</span><div class="bar" style="width:4px"></div></div>
<div class="r"><span class="tok">--strat-space-3 · 6px</span><div class="bar" style="width:6px"></div></div>
<div class="r"><span class="tok">--strat-space-4 · 8px</span><div class="bar" style="width:8px"></div></div>
<div class="r"><span class="tok">--strat-space-5 · 10px</span><div class="bar" style="width:10px"></div></div>
<div class="r"><span class="tok">--strat-space-6 · 12px</span><div class="bar" style="width:12px"></div></div>
<div class="r"><span class="tok">--strat-space-7 · 14px</span><div class="bar" style="width:14px"></div></div>
<div class="r"><span class="tok">--strat-space-8 · 16px</span><div class="bar" style="width:16px"></div></div>
</body></html>
