<!-- @dsCard group="Brand" viewport="700x160" name="Logo & wordmark" subtitle="The blue S mark and the always-lowercase 'stratus' wordmark" -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>body{margin:0;background:var(--strat-bg);color:var(--strat-text);font-family:var(--strat-font-sans);padding:20px;display:flex;gap:36px;align-items:center}.mark{display:flex;gap:14px;align-items:center}.mark img{width:56px;height:56px;border-radius:12px}.word{font-size:30px;font-weight:800;letter-spacing:-.02em}.eyebrow{font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--strat-muted)}.on{background:var(--strat-bg-elev);border:1px solid var(--strat-border);border-radius:8px;padding:14px 18px}</style></head>
<body>
<div class="mark"><img src="../assets/logo.png" alt="stratus logo" /><span class="word">stratus</span></div>
<div class="on">
<div class="eyebrow">STRATUS</div>
<div style="color:var(--strat-muted);font-size:12px;margin-top:6px;max-width:280px">The rail eyebrow renders the wordmark uppercase &amp; muted at 11px. Everywhere else it is lowercase. Never title-case "Stratus".</div>
</div>
</body></html>
