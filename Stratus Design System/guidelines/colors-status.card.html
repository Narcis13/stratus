<!-- @dsCard group="Colors" viewport="700x120" name="Post status" subtitle="The publishing lifecycle, from draft to cancelled" -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>body{margin:0;background:var(--strat-bg);font-family:var(--strat-font-sans);padding:16px}.row{display:flex;gap:8px}.sw{flex:1;border-radius:6px;border:1px solid var(--strat-border);padding:10px;min-height:52px;display:flex;flex-direction:column;justify-content:space-between}.dot{width:12px;height:12px;border-radius:999px}.n{font-size:11px;font-weight:600;color:var(--strat-text)}</style></head>
<body><div class="row">
<div class="sw"><span class="dot" style="background:var(--strat-status-draft)"></span><span class="n">draft</span></div>
<div class="sw"><span class="dot" style="background:var(--strat-status-pending)"></span><span class="n">pending</span></div>
<div class="sw"><span class="dot" style="background:var(--strat-status-publishing)"></span><span class="n">publishing</span></div>
<div class="sw"><span class="dot" style="background:var(--strat-status-posted)"></span><span class="n">posted</span></div>
<div class="sw"><span class="dot" style="background:var(--strat-status-failed)"></span><span class="n">failed</span></div>
<div class="sw"><span class="dot" style="background:var(--strat-status-cancelled)"></span><span class="n">cancelled</span></div>
</div></body></html>
