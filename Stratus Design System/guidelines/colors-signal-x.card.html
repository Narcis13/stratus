<!-- @dsCard group="Colors" viewport="700x130" name="Signal & X-companion" subtitle="Reply bands + pillar, and X's own palette for blending in" -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>body{margin:0;background:var(--strat-bg);font-family:var(--strat-font-sans);padding:16px;color:var(--strat-text)}.lbl{font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--strat-muted);margin:0 0 6px}.row{display:flex;gap:8px;margin-bottom:12px}.sw{flex:1;border-radius:6px;padding:10px;min-height:44px;display:flex;flex-direction:column;justify-content:flex-end;font-size:11px;font-weight:600}</style></head>
<body>
<p class="lbl">Reply-band signal &amp; pillar</p>
<div class="row">
<div class="sw" style="color:var(--strat-band-hot);border:1px solid var(--strat-band-hot);background:rgba(0,186,124,.1)">hot</div>
<div class="sw" style="color:var(--strat-band-warm-text);border:1px solid var(--strat-band-warm);background:rgba(255,179,0,.12)">warm</div>
<div class="sw" style="color:var(--strat-pillar);background:var(--strat-pillar-bg)">pillar</div>
</div>
<p class="lbl">X-companion (X's real values, for surfaces that blend into the timeline)</p>
<div class="row">
<div class="sw" style="background:var(--x-blue);color:#fff">x-blue<br>#1d9bf0</div>
<div class="sw" style="background:var(--x-dim-bg);color:#fff">x-dim<br>#15202b</div>
<div class="sw" style="background:var(--x-border);color:#fff">x-border<br>#2f3336</div>
<div class="sw" style="background:var(--x-red);color:#fff">x-red<br>#f4212e</div>
</div>
</body></html>
