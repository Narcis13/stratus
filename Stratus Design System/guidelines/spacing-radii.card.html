<!-- @dsCard group="Spacing" viewport="700x150" name="Radii & borders" subtitle="6px is the default; flat surfaces bound by 1px hairlines" -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>body{margin:0;background:var(--strat-bg);font-family:var(--strat-font-sans);padding:18px;display:flex;gap:14px;align-items:flex-end}.box{background:var(--strat-bg-elev);border:1px solid var(--strat-border);width:84px;height:70px;display:flex;align-items:center;justify-content:center;color:var(--strat-text);font-size:11px}.cap{display:block;text-align:center;color:var(--strat-muted);font-size:10px;font-family:var(--strat-font-mono);margin-top:6px}.pill{border-radius:999px;width:110px}</style></head>
<body>
<div><div class="box" style="border-radius:4px">4px</div><span class="cap">sm</span></div>
<div><div class="box" style="border-radius:6px">6px</div><span class="cap">md · default</span></div>
<div><div class="box" style="border-radius:8px">8px</div><span class="cap">lg · panel</span></div>
<div><div class="box" style="border-radius:10px">10px</div><span class="cap">badge</span></div>
<div><div class="box pill">999px</div><span class="cap">pill</span></div>
</body></html>
