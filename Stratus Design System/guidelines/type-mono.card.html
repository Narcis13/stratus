<!doctype html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>body{margin:0;background:var(--strat-bg);color:var(--strat-text);font-family:var(--strat-font-sans);padding:18px;display:flex;gap:40px;align-items:center}.k{color:var(--strat-muted);font-size:11px;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}code{font-family:var(--strat-font-mono);font-size:12px;background:var(--strat-bg-hover);padding:2px 6px;border-radius:3px}.nums{font-size:22px;font-variant-numeric:tabular-nums;font-weight:600}</style></head>
<body>
<div><div class="k">Monospace</div><code>tweet 1934820113847</code></div>
<div><div class="k">Tabular numerals</div><div class="nums">214.7K · 3.8% · $0.0142</div></div>
</body></html>
