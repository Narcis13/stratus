<!-- @dsCard group="Components" viewport="700x300" name="Layout — Panel, TabRail & Modal" subtitle="The panel shell, vertical tab rail, and dialog" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>body{margin:0;background:var(--strat-bg);color:var(--strat-text);font-family:var(--strat-font-sans);font-size:13px;padding:16px}.wrap{display:flex;gap:16px;align-items:flex-start;height:268px}.railbox{height:100%;border-radius:8px;overflow:hidden}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Panel, TabRail, Modal, Button, Badge } = window.StratusDesignSystem_4635dc;
const TABS = [{id:"today",label:"Today"},{id:"people",label:"People"},{id:"composer",label:"Composer"},{id:"replies",label:"Replies"},{id:"voice",label:"Voice"},{id:"settings",label:"Settings"}];
function Card(){
  const [tab,setTab] = React.useState("today");
  const [open,setOpen] = React.useState(false);
  return(
  <div className="wrap">
    <div className="railbox"><TabRail tabs={TABS} active={tab} onSelect={setTab} /></div>
    <Panel title="Today" actions={<Button onClick={()=>setOpen(true)}>View prompt</Button>} style={{flex:1,maxWidth:420}}>
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        <Badge tone="posted">posted</Badge>
        <span style={{color:"var(--strat-muted)",fontSize:12}}>3 posts shipped · 2.1K replies this week</span>
      </div>
      <p style={{margin:0,color:"var(--strat-muted)",fontSize:12,lineHeight:1.5}}>The Panel is the elevated card that wraps every tab. Header on top, content stacked below with a 12px gap.</p>
    </Panel>
    {open && <Modal title="Default reply system prompt" onClose={()=>setOpen(false)}>
      <pre style={{margin:0,whiteSpace:"pre-wrap",fontSize:12,lineHeight:1.45,background:"var(--strat-bg)",border:"1px solid var(--strat-border)",borderRadius:6,padding:10,color:"var(--strat-text)"}}>Reply like a terse engineer who has done the work.
No emoji. ≤ 240 chars. One concrete idea.</pre>
    </Modal>}
  </div>
);}
ReactDOM.createRoot(document.getElementById("root")).render(<Card/>);
</script>
</body>
</html>
