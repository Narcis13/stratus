<!doctype html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="styles.css" />
<style>html,body{margin:0;height:100%}.tile{width:1280px;height:854px;display:flex;font-family:var(--strat-font-sans);overflow:hidden}.main{flex:1;background:var(--strat-bg);display:flex;align-items:center;justify-content:center;gap:40px}.main img{width:200px;height:200px;border-radius:44px}.word{font-size:150px;font-weight:800;letter-spacing:-.03em;color:var(--strat-text)}.strip{width:150px;display:flex;flex-direction:column}.strip div{flex:1}</style></head>
<body>
<div class="tile">
<div class="main"><img src="assets/logo.png" alt="stratus" /><span class="word">stratus</span></div>
<div class="strip">
<div style="background:var(--strat-ok)"></div>
<div style="background:var(--strat-warn)"></div>
<div style="background:var(--strat-accent)"></div>
<div style="background:var(--strat-danger)"></div>
</div>
</div>
</body></html>
