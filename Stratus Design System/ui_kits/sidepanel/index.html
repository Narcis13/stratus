<!-- @dsCard group="Stratus Side Panel" viewport="1280x820" name="stratus, docked next to X" subtitle="The side panel companion running beside a live X timeline" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>stratus — side panel</title>
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.544.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html,body{margin:0;height:100%;background:#000}
  #root{height:100vh}
  *{box-sizing:border-box}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="XTimeline.jsx"></script>
<script type="text/babel" src="TodayScreen.jsx"></script>
<script type="text/babel" src="ComposerScreen.jsx"></script>
<script type="text/babel" src="ReplyScreen.jsx"></script>
<script type="text/babel">
const { useState, useEffect } = React;
const { TabRail } = window.StratusDesignSystem_4635dc;

const TABS = [
  { id: "today", label: "Today" },
  { id: "people", label: "People", disabled: true },
  { id: "channels", label: "Channels", disabled: true },
  { id: "calendar", label: "Calendar", disabled: true },
  { id: "composer", label: "Composer" },
  { id: "studio", label: "Studio", disabled: true },
  { id: "harvest", label: "Harvest", disabled: true },
  { id: "voice", label: "Voice", disabled: true },
  { id: "replies", label: "Replies" },
  { id: "ideas", label: "Ideas", disabled: true },
  { id: "playbook", label: "Playbook", disabled: true },
  { id: "settings", label: "Settings", disabled: true },
];

function SidePanel() {
  const [tab, setTab] = useState("today");
  const Screen = { today: window.TodayScreen, composer: window.ComposerScreen, replies: window.ReplyScreen }[tab];
  return (
    <div style={{ display: "flex", height: "100%", width: 400, flexShrink: 0, background: "var(--strat-bg)", borderLeft: "1px solid var(--strat-border)" }}>
      <TabRail tabs={TABS} active={tab} onSelect={setTab} />
      <main style={{ flex: 1, minWidth: 0, overflowY: "auto", padding: 12 }}>
        {Screen ? <Screen /> : null}
      </main>
    </div>
  );
}

function App() {
  useEffect(() => { if (window.lucide) window.lucide.createIcons(); });
  return (
    <div style={{ display: "flex", height: "100%" }}>
      <div style={{ flex: 1, minWidth: 0 }}><window.XTimeline /></div>
      <SidePanel />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
